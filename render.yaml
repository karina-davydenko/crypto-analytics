services:
  - type: web
    name: crypto-analytics-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Заполнить вручную в Render dashboard
      - key: CORS_ORIGINS
        sync: false   # Заполнить вручную: https://your-app.vercel.app
