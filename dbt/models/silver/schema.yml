version: 2

models:
  - name: silver_prices
    description: "Серебряный слой цен. Дедуплицированные и очищенные данные — одна запись на монету за час."
    columns:
      - name: id
        description: "Первичный ключ из raw_prices"
        tests:
          - not_null
          - unique
      - name: coin_id
        description: "ID монеты в CoinGecko"
        tests:
          - not_null
      - name: price_usd
        description: "Цена в долларах (только валидные значения > 0)"
        tests:
          - not_null
      - name: price_hour
        description: "Час получения данных (date_trunc hour). Используется в gold для группировки."
        tests:
          - not_null

  - name: silver_news
    description: "Серебряный слой новостей. Дедуплицированные новости с sentiment анализом от TextBlob."
    columns:
      - name: id
        description: "Первичный ключ из raw_news"
        tests:
          - not_null
          - unique
      - name: url
        description: "URL статьи — уникальный ключ"
        tests:
          - not_null
          - unique
      - name: title
        description: "Заголовок новости"
        tests:
          - not_null
      - name: sentiment_score
        description: "Тональность от -1.0 (негатив) до +1.0 (позитив). 0.0 если не вычислено."
        tests:
          - not_null
      - name: sentiment_label
        description: "Метка тональности: positive / negative / neutral"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['positive', 'negative', 'neutral']
